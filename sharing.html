    <section id="sharing">

        <div class="posts">
            <!-- 文章卡片 1：实验报告写作方法 -->
            <article class="post">
                <a class="post-link" href="posts/post-lab-report.html">
                    <h3 class="post-title">学习笔记：如何高效写实验报告</h3>
                    <p class="post-meta">时间：2026-03-11｜关键词：学习方法 / 写作</p>
                    <p class="post-excerpt">先把结论写出来，再补关键数据与截图；结构上用“目的—方法—结果—分析—结论”；最后统一排版与编号，保证老师一眼能抓住重点……</p>
                </a>
            </article>

            <article class="post">
                <a class="post-link" href="posts/post-teamwork.html">

                    <p class="post-meta">时间：2026-03-10｜关键词：项目协作 / 复盘</p>
                    <p class="post-excerpt">不要按“人”分工，要按“模块/接口”分工；每天同步 10 分钟只讲阻塞；任务拆小并写到看板；代码规范和提交信息统一起来，后面返工会少很多……</p>
                </a>
            </article>

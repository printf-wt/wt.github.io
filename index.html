<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>登录</title>
    <link rel="stylesheet" href="assets/css/index.css">
    <link rel="stylesheet" href="assets/css/background.css">
</head>
<body class="container">
    <main class="login-page">
        <div class="login-card" role="dialog" aria-modal="true" aria-labelledby="login-title">
            <h1 id="login-title">登录</h1>
            <p class="login-tip">请输入账号与密码登录</p>

            <form id="login-form" class="login-form">
                <label class="login-label" for="login-username">用户名</label>
                <input id="login-username" name="username" class="login-input" type="text" autocomplete="username" required>

                <label class="login-label" for="login-password">密码</label>
                <input id="login-password" name="password" class="login-input" type="password" autocomplete="current-password" required>

                <p id="login-error" class="login-error" role="alert" aria-live="polite"></p>

                <button class="login-button" type="submit">进入主页</button>

                <a class="login-register" href="register.html">没有账号？去注册</a>
            </form>
        </div>
    </main>

    <script src="assets/js/index.js" defer></script>
</body>
</html>
